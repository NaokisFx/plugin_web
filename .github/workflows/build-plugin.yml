name: Compilar plugin NexNordDelivery

on:
  push:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compilar con Maven
        working-directory: minecraft-plugin
        run: mvn -B clean package

      - name: Subir el .jar como descarga
        uses: actions/upload-artifact@v4
        with:
          name: NexNordDelivery-jar
          path: minecraft-plugin/target/NexNordDelivery-*.jar
